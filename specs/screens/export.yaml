version: "2.0"
screen:
  name: "Export"
  route: "/export"
  layout: "full-width"
  description: "Full-width export configuration and execution screen with progress overlay and completion dialog"

data_requirements:
  - resource: "exports"
    needs: [id, status, action, target_path, total_files, processed_files, total_size, transferred_size, transfer_speed, conflict_strategy, auto_create_folder, failed_count, elapsed_seconds, estimated_remaining_seconds]
  - resource: "export_items"
    needs: [export_id, photo_id, group_id]
  - resource: "photos"
    needs: [id, filename, path, file_size]

components:
  # Header Bar with Title
  - id: "header_bar"
    type: "header"
    position: "top"
    function: "Display screen title and navigation"
    height: "60px"
    children:
      - id: "title"
        type: "label"
        content: "OptiShot > Export"
        font_size: "18px"
        font_weight: "bold"
      - id: "header_actions"
        type: "button-group"
        align: "right"
        children:
          - id: "settings_icon"
            type: "icon-button"
            icon: "settings"
            action: "navigate-settings"
          - id: "help_icon"
            type: "icon-button"
            icon: "help"
            action: "show-help"

  # Export Summary Section
  - id: "export_summary"
    type: "card"
    position: "main"
    function: "Display summary of files and data to export"
    children:
      - id: "summary_title"
        type: "label"
        content: "📊 Export Summary"
        font_size: "16px"
        font_weight: "bold"
      - id: "file_count_stat"
        type: "stat"
        label: "Files to Export"
        value: "{{total_files}}"
      - id: "total_size_stat"
        type: "stat"
        label: "Total Size"
        value: "{{total_size}} bytes"
      - id: "estimated_time_stat"
        type: "stat"
        label: "Estimated Time"
        value: "~{{estimated_remaining_seconds}}s"
        hint: "(Varies by network speed)"

  # Target Folder Selection
  - id: "target_folder"
    type: "card"
    position: "main"
    function: "Configure target folder and auto-create option"
    children:
      - id: "folder_label"
        type: "label"
        content: "📂 Target Folder"
        font_size: "16px"
        font_weight: "bold"
      - id: "folder_input"
        type: "text-input"
        placeholder: "Select target folder..."
        value: "{{target_path}}"
        read_only: false
        function: "Display selected target folder path"
      - id: "folder_actions"
        type: "button-group"
        children:
          - id: "browse_button"
            type: "button"
            label: "Browse..."
            action: "open-folder-dialog"
          - id: "verify_button"
            type: "button"
            label: "Verify Path"
            action: "validate-folder-path"
          - id: "create_new_button"
            type: "button"
            label: "New Folder"
            action: "create-folder-dialog"
      - id: "auto_create_checkbox"
        type: "checkbox"
        label: "Auto-create folder if not exists"
        checked: "{{auto_create_folder}}"
        function: "Toggle automatic folder creation"
    events:
      - on: "browse_button-click"
        do: "open-folder-browser"
        target: "folder_input"
      - on: "verify_button-click"
        do: "validate-and-show-result"
        target: "folder_input"
      - on: "auto_create_checkbox-change"
        do: "update-export-option"
        field: "auto_create_folder"
        target: "exports"

  # Action Selector (Copy/Move)
  - id: "action_selector"
    type: "card"
    position: "main"
    function: "Choose copy or move action for files"
    children:
      - id: "action_label"
        type: "label"
        content: "⚙ Export Action"
        font_size: "16px"
        font_weight: "bold"
      - id: "copy_radio"
        type: "radio-button"
        group: "export_action"
        label: "Copy (Keep originals)"
        value: "copy"
        checked: "{{action === 'copy'}}"
        description: "Original files remain in source folders"
      - id: "move_radio"
        type: "radio-button"
        group: "export_action"
        label: "Move (To trash)"
        value: "move"
        checked: "{{action === 'move'}}"
        description: "Original files moved to .optishot/trash"
      - id: "move_warning"
        type: "alert"
        alert_type: "warning"
        content: "⚠️ Move: Files auto-deleted 30 days after trash"
        visible: "{{action === 'move'}}"
    events:
      - on: "copy_radio-change"
        do: "update-export-option"
        field: "action"
        value: "copy"
        target: "exports"
      - on: "move_radio-change"
        do: "update-export-option"
        field: "action"
        value: "move"
        target: "exports"

  # Conflict Strategy
  - id: "conflict_strategy"
    type: "card"
    position: "main"
    function: "Define behavior when target file already exists"
    children:
      - id: "conflict_label"
        type: "label"
        content: "Conflict Handling"
        font_size: "16px"
        font_weight: "bold"
      - id: "skip_radio"
        type: "radio-button"
        group: "conflict_action"
        label: "Skip"
        value: "skip"
        checked: "{{conflict_strategy === 'skip'}}"
        description: "Don't copy/move file if already exists"
      - id: "rename_radio"
        type: "radio-button"
        group: "conflict_action"
        label: "Rename"
        value: "rename"
        checked: "{{conflict_strategy === 'rename'}}"
        description: "Add suffix (_1, _2) to filename"
      - id: "overwrite_radio"
        type: "radio-button"
        group: "conflict_action"
        label: "Overwrite"
        value: "overwrite"
        checked: "{{conflict_strategy === 'overwrite'}}"
        description: "Replace existing file"
    events:
      - on: "skip_radio-change"
        do: "update-export-option"
        field: "conflict_strategy"
        value: "skip"
        target: "exports"
      - on: "rename_radio-change"
        do: "update-export-option"
        field: "conflict_strategy"
        value: "rename"
        target: "exports"
      - on: "overwrite_radio-change"
        do: "update-export-option"
        field: "conflict_strategy"
        value: "overwrite"
        target: "exports"

  # Action Buttons (Footer)
  - id: "action_buttons"
    type: "footer"
    position: "bottom"
    height: "60px"
    children:
      - id: "cancel_button"
        type: "button"
        label: "◀ Cancel"
        action: "navigate-back"
      - id: "start_export_button"
        type: "button"
        label: "Export Start ▶"
        action: "start-export"
        primary: true
        enabled: "{{target_path !== null && total_files > 0}}"
    events:
      - on: "cancel_button-click"
        do: "navigate"
        destination: "/review"
      - on: "start_export_button-click"
        do: "validate-config-and-start"
        target: "exports"

  # Progress Overlay (Conditional - appears when status=running)
  - id: "progress_overlay"
    type: "overlay"
    visible: "{{status === 'running'}}"
    function: "Display real-time export progress"
    z_index: "1000"
    children:
      - id: "progress_content"
        type: "card"
        align: "center"
        children:
          - id: "progress_title"
            type: "label"
            content: "💾 Export in Progress..."
            font_size: "18px"
            font_weight: "bold"
          - id: "progress_bar"
            type: "progress-bar"
            value: "{{(processed_files / total_files) * 100}}"
            max: "100"
          - id: "progress_percent"
            type: "label"
            content: "{{(processed_files / total_files) * 100 | round}}%"
          - id: "processed_stat"
            type: "stat"
            label: "Processed"
            value: "{{processed_files}} / {{total_files}}"
          - id: "transferred_stat"
            type: "stat"
            label: "Transferred"
            value: "{{transferred_size}} / {{total_size}}"
          - id: "speed_stat"
            type: "stat"
            label: "Speed"
            value: "{{transfer_speed}} bytes/sec"
          - id: "remaining_time_stat"
            type: "stat"
            label: "Remaining Time"
            value: "~{{estimated_remaining_seconds}}s"
          - id: "current_file"
            type: "label"
            content: "Current: {{current_file}} ..."
            font_size: "12px"
            color: "gray"
          - id: "progress_actions"
            type: "button-group"
            children:
              - id: "pause_button"
                type: "button"
                label: "⏸ Pause"
                action: "pause-export"
              - id: "cancel_export_button"
                type: "button"
                label: "⏹ Cancel"
                action: "cancel-export"
                color: "danger"
    data_source:
      resource: "exports"
      poll_interval: "500ms"
    events:
      - on: "pause_button-click"
        do: "pause-export"
        target: "exports"
      - on: "cancel_export_button-click"
        do: "confirm-cancel-export"
        target: "exports"

  # Completion Dialog (Conditional - appears when status=completed)
  - id: "completion_dialog"
    type: "modal"
    visible: "{{status === 'completed'}}"
    function: "Display export completion summary and next actions"
    z_index: "1001"
    backdrop_dismiss: false
    children:
      - id: "completion_title"
        type: "label"
        content: "✅ Export Complete!"
        font_size: "20px"
        font_weight: "bold"
      - id: "success_stat"
        type: "stat"
        label: "Successful"
        value: "{{total_files - failed_count}}"
      - id: "failed_stat"
        type: "stat"
        label: "Failed"
        value: "{{failed_count}}"
        visible: "{{failed_count > 0}}"
        color: "danger"
      - id: "transferred_stat"
        type: "stat"
        label: "Transferred"
        value: "{{transferred_size}} bytes"
      - id: "elapsed_time_stat"
        type: "stat"
        label: "Time Elapsed"
        value: "{{elapsed_seconds}}s"
      - id: "completion_actions"
        type: "button-group"
        children:
          - id: "open_folder_button"
            type: "button"
            label: "Open Folder"
            action: "open-target-folder"
          - id: "view_log_button"
            type: "button"
            label: "View Log"
            action: "show-export-log"
            visible: "{{failed_count > 0}}"
          - id: "close_dialog_button"
            type: "button"
            label: "Done"
            action: "close-dialog-navigate-dashboard"
            primary: true
    events:
      - on: "open_folder_button-click"
        do: "open-system-folder"
        path: "{{target_path}}"
      - on: "view_log_button-click"
        do: "show-export-error-log"
        target: "exports"
      - on: "close_dialog_button-click"
        do: "navigate"
        destination: "/dashboard"

  # Error Dialog (Conditional - appears when status=failed)
  - id: "error_dialog"
    type: "modal"
    visible: "{{status === 'failed'}}"
    function: "Display export failure information"
    z_index: "1001"
    backdrop_dismiss: false
    children:
      - id: "error_title"
        type: "label"
        content: "❌ Export Failed"
        font_size: "18px"
        color: "danger"
      - id: "error_message"
        type: "text"
        content: "{{error_message}}"
      - id: "error_stats"
        type: "stat-group"
        children:
          - id: "processed_error_stat"
            type: "stat"
            label: "Processed"
            value: "{{processed_files}} / {{total_files}}"
          - id: "failed_error_stat"
            type: "stat"
            label: "Failed"
            value: "{{failed_count}}"
      - id: "error_actions"
        type: "button-group"
        children:
          - id: "view_error_log_button"
            type: "button"
            label: "View Details"
            action: "show-export-error-log"
          - id: "retry_export_button"
            type: "button"
            label: "Retry"
            action: "retry-export"
          - id: "cancel_error_button"
            type: "button"
            label: "Cancel"
            action: "close-error-dialog"
    events:
      - on: "view_error_log_button-click"
        do: "show-error-details"
        target: "exports"
      - on: "retry_export_button-click"
        do: "resume-export"
        target: "exports"

connections:
  navigations:
    - from: "cancel_button"
      to: "/review"
    - from: "close_dialog_button"
      to: "/dashboard"
  shared_components:
    - "header_bar"
  data_flow:
    - source: "target_folder"
      target: "exports"
      on: "folder-select"
    - source: "action_selector"
      target: "exports"
      on: "action-change"
    - source: "conflict_strategy"
      target: "exports"
      on: "strategy-change"
    - source: "progress_overlay"
      target: "exports"
      on: "status-poll"

tests:
  - name: "Load export screen with selected items"
    when: "User navigates to /export from /review"
    then:
      - "Summary displays correct file count and size"
      - "All form fields show default values"
      - "Start button is disabled until target folder selected"

  - name: "Select target folder"
    when: "User clicks Browse button and selects folder"
    then:
      - "Target path updates in input field"
      - "Verify button validates path"
      - "Start button becomes enabled"

  - name: "Change export action"
    when: "User selects Move option"
    then:
      - "Warning message appears"
      - "Export option updates in model"
      - "Conflict strategy options remain available"

  - name: "Start export with valid config"
    when: "User clicks Export Start with all required fields"
    then:
      - "Progress overlay appears"
      - "Export status changes to running"
      - "Progress updates in real-time"
      - "Pause and Cancel buttons are active"

  - name: "Export progress updates"
    when: "Export is running"
    then:
      - "Progress bar increments smoothly"
      - "Processed count increases"
      - "Transfer speed calculated"
      - "Estimated time decreases"
      - "Current filename displays"

  - name: "Cancel export mid-process"
    when: "User clicks Cancel button during export"
    then:
      - "Confirmation dialog appears"
      - "Export pauses on confirmation"
      - "Progress overlay remains visible"
      - "Already processed files retained"

  - name: "Export completes successfully"
    when: "All files exported without errors"
    then:
      - "Progress reaches 100%"
      - "Completion dialog appears"
      - "Summary shows success count"
      - "Failed count shows 0"
      - "User can open folder or dismiss"

  - name: "Export with conflicts"
    when: "Target folder contains files with same names"
    then:
      - "Conflict strategy applied (skip/rename/overwrite)"
      - "Failed count reflects skipped files"
      - "Completion dialog shows results"

  - name: "Export fails with error"
    when: "Export encounters read/write error"
    then:
      - "Progress overlay shows error"
      - "Error dialog displays with details"
      - "User can retry or cancel"
      - "Retry resumes from last checkpoint"

  - name: "Navigate back to review"
    when: "User cancels export before starting"
    then:
      - "Returns to /review screen"
      - "Selected items preserved"
      - "Export configuration cleared"
